name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev,vector,graph,working,api,sql,scheduler]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy
      - name: Test
        run: pytest

  integration:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports: ["6333:6333"]
      neo4j:
        image: neo4j:5.24-community
        env:
          NEO4J_AUTH: neo4j/memcore-dev-password
        ports: ["7687:7687"]
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memcore
          POSTGRES_PASSWORD: memcore
          POSTGRES_DB: memcore
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - name: Install
        run: pip install -e ".[dev,vector,graph,working,api,sql,postgres,scheduler,observability]"
      - name: Wait for backends
        run: |
          ready=0
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/localhost/6333) 2>/dev/null && \
            (exec 3<>/dev/tcp/localhost/7687) 2>/dev/null && \
            (exec 3<>/dev/tcp/localhost/6379) 2>/dev/null && \
            (exec 3<>/dev/tcp/localhost/5432) 2>/dev/null && { ready=1; break; }
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "backends did not become reachable in time" >&2
            exit 1
          fi
      - name: Integration tests
        env:
          MEMCORE_GRAPH__PASSWORD: memcore-dev-password
          MEMCORE_DATABASE__URL: postgresql+asyncpg://memcore:memcore@localhost:5432/memcore
        run: |
          pytest -m integration -ra --no-cov 2>&1 | tee out.txt
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          if grep -qE "^SKIPPED|[0-9]+ skipped" out.txt; then
            echo "integration tests skipped — backends not reachable" >&2
            exit 1
          fi

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t memcore:ci .
      - name: Smoke test image
        run: docker run --rm memcore:ci python -c "import memcore; import memcore.api; print('image import OK')"
      - name: Validate compose
        run: |
          cp .env.example .env
          docker compose config >/dev/null
